<!-- Header Component -->
<header class="header">
    <div class="container">
        <nav class="navbar">
            <a href="/" class="logo">
                <i class="fas fa-leaf"></i>
                FreshShare
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/groups" class="nav-link">Groups</a>
                <a href="/dashboard" class="nav-link" id="dashboardLink">Dashboard</a>
                <a href="/about" class="nav-link" id="aboutLink">About</a>
                <a href="/community" class="nav-link">Community</a>
                <a href="/wallet" class="nav-link" id="walletLink">
                    <i class="fas fa-wallet"></i>
                    Wallet
                </a>
                <div id="auth-buttons">
                    <a href="/login" class="btn btn-login" id="loginBtn">Login</a>
                    <a href="/register" class="btn btn-register" id="registerBtn">Register</a>
                    <button onclick="logout()" class="btn btn-logout" id="logoutBtn" style="display: none;">Logout</button>
                </div>
            </div>
        </nav>
    </div>
</header>

<script>
(function() {
    async function updateHeader() {
        const token = localStorage.getItem('token');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const dashboardLink = document.getElementById('dashboardLink');
        const walletLink = document.getElementById('walletLink');

        if (token) {
            loginBtn.style.display = 'none';
            registerBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            dashboardLink.style.display = 'inline-block';
            walletLink.style.display = 'inline-block';
        } else {
            loginBtn.style.display = 'inline-block';
            registerBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            dashboardLink.style.display = 'none';
            walletLink.style.display = 'none';
        }
    }

    async function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login';
    }

    window.logout = logout;
    document.addEventListener('DOMContentLoaded', updateHeader);
})();
</script>
